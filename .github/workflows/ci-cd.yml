name: CI/CD FastAPI
on: 
  push:
    branches: 
      - main
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{github.actor}}
          password: ${{secrets.CR_PAT}}
        
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/tanh8805/rag-fastapi:latest
            ghcr.io/tanh8805/rag-fastapi:v${{github.run_number}}
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: SSH and deploy new code
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{secrets.VPS_HOST}}
          username: ${{secrets.VPS_USERNAME}}
          key: ${{secrets.VPS_KEY}}
          script: 
            cd ~/rag-project
            echo "${{ secrets.CR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker-compose pull rag-fastapi
            docker-compose up -d rag-fastapi:latest
            docker image prune -f